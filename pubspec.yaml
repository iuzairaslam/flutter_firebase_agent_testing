name: flutter_firebase_agent_testing
description: Scaffold Firebase App Testing Agent CI for Flutter Android apps — YAML tests, GitHub Actions, and a setup CLI.
version: 1.0.1
homepage: https://github.com/iuzairaslam/flutter_firebase_agent_testing
repository: https://github.com/iuzairaslam/flutter_firebase_agent_testing
issue_tracker: https://github.com/iuzairaslam/flutter_firebase_agent_testing/issues

environment:
  sdk: ^3.5.0
  flutter: ">=3.22.0"

false_secrets:
  - example/android/app/google-services.json

topics:
  - firebase
  - ci
  - testing
  - android
  - yaml

dependencies:
  args: ^2.5.0
  flutter:
    sdk: flutter
  meta: ^1.12.0
  yaml: ^3.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: false

executables:
  firebase_agent_ci:
