name: Firebase App Testing Agent CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Firebase App Distribution console
        run: echo "Open App Testing results at https://console.firebase.google.com/project/demo-test/appdistribution"

      - name: Write Firebase Service Account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > sa.json

      - name: Run Firebase App Testing Agent
        id: run_tests
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa.json
        run: |
          firebase apptesting:execute \
            --app=${{ secrets.FIREBASE_APP_ID }} \
            --test-dir=./tests \
            build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
