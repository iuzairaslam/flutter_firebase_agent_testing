name: Firebase App Testing Agent CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    working-directory: example

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: ${{ runner.os }}-flutter-${{ hashFiles('example/pubspec.lock', 'pubspec.lock') }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Verify APK exists
        run: ls -la build/app/outputs/flutter-apk/app-release.apk

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase Service Account
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: printf '%s' "$FIREBASE_SA_JSON" > sa.json

      - name: Validate Firebase App ID secret
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          APP_ID="$(printf '%s' "$FIREBASE_APP_ID" | tr -d '[:space:]')"
          if ! printf '%s' "$APP_ID" | grep -Eq '^1:[0-9]+:android:[a-f0-9]+$'; then
            echo "FIREBASE_APP_ID secret is invalid."
            echo "It must look like: 1:23964225660:android:80e257045351391730f9f9"
            exit 1
          fi
          printf '%s' "$APP_ID" > .firebase_app_id

      - name: Run Firebase App Testing Agent
        id: run_tests
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa.json
          FIREBASE_DEBUG: true
          DEBUG: '*'
        run: |
          APP_ID="$(tr -d '[:space:]' < .firebase_app_id)"
          APK="./build/app/outputs/flutter-apk/app-release.apk"
          DEVICES='model=MediumPhone.arm,version=36,locale=en_US,orientation=portrait'
          firebase --debug apptesting:execute "$APK" \
            --app="$APP_ID" \
            --test-dir=./tests \
            --test-devices "$DEVICES" || {
              echo ""
              echo "=== App Testing Agent failed ==="
              echo "If 403 on POST .../releases/.../tests: add Editor + App Distribution Admin + Quality Admin to the service account."
              echo "If FAILED_AI_STEP: open App Distribution → release → App Testing agent tab for screenshots; use concrete finalScreenAssertion text visible on screen."
              exit 1
            }

      - name: Firebase App Distribution console
        if: always()
        run: echo "https://console.firebase.google.com/project/rebase-agent-testing/appdistribution"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release-apk
          path: example/build/app/outputs/flutter-apk/app-release.apk
